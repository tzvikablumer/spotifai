<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spotif.ai — AI Music Studio</title>
  <meta name="description" content="Generate and listen to AI-created music with a beautiful Spotify-like interface">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div id="app">
    <!-- Sidebar (desktop) -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <img class="logo-icon" src="/favicon.png" alt="spotif.ai logo">
        <span class="logo-text">spotif.ai</span>
      </div>
      <ul class="nav-list">
        <li><a href="#home" class="nav-link active" data-view="home"><span class="nav-icon">🏠</span><span
              class="nav-label">Home</span></a></li>
        <li><a href="#search" class="nav-link" data-view="search"><span class="nav-icon">🔍</span><span
              class="nav-label">Search</span></a></li>
        <li><a href="#artists" class="nav-link" data-view="artists"><span class="nav-icon">🎤</span><span
              class="nav-label">Artists</span></a></li>
        <li><a href="#albums" class="nav-link" data-view="albums"><span class="nav-icon">💿</span><span
              class="nav-label">Albums</span></a></li>
      </ul>
      <button id="create-btn" class="create-btn" onclick="app.toggleCreateChoice()">
        <span class="create-icon">✨</span>
        <span>Create</span>
      </button>
      <!-- Create Choice Popup -->
      <div id="create-choice" class="create-choice hidden">
        <button class="create-choice-option" onclick="app.showCreateModal(); app.hideCreateChoice()">
          <span class="choice-icon">🎵</span>
          <div class="choice-text">
            <div class="choice-title">Create Song</div>
            <div class="choice-desc">Generate a single track</div>
          </div>
        </button>
        <button class="create-choice-option" onclick="app.showAlbumWizard(); app.hideCreateChoice()">
          <span class="choice-icon">💿</span>
          <div class="choice-text">
            <div class="choice-title">Create Album</div>
            <div class="choice-desc">AI-planned multi-track album</div>
          </div>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <header class="top-bar">
        <button class="mobile-menu-btn" onclick="app.toggleSidebar()">☰</button>
        <div class="top-bar-nav">
          <button class="nav-arrow" onclick="history.back()">‹</button>
          <button class="nav-arrow" onclick="history.forward()">›</button>
        </div>
        <div id="top-bar-title" class="top-bar-title"></div>
      </header>
      <div id="view-container" class="view-container"></div>
    </main>

    <!-- Bottom Player -->
    <div id="player-bar" class="player-bar">
      <div class="player-track-info">
        <img id="player-cover" class="player-cover" src="" alt="" style="display:none">
        <div class="player-text">
          <div id="player-title" class="player-title"></div>
          <div id="player-artist" class="player-artist"></div>
        </div>
      </div>
      <div class="player-controls">
        <div class="player-buttons">
          <button class="player-btn" id="btn-shuffle" onclick="app.player.toggleShuffle()" title="Shuffle">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor"
                d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
            </svg>
          </button>
          <button class="player-btn" onclick="app.player.prev()" title="Previous">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button class="player-btn player-btn-play" id="btn-play" onclick="app.player.togglePlay()" title="Play">
            <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28">
              <path fill="currentColor" d="M8 5v14l11-7z" />
            </svg>
            <svg id="icon-pause" viewBox="0 0 24 24" width="28" height="28" style="display:none">
              <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>
          <button class="player-btn" onclick="app.player.next()" title="Next">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
            </svg>
          </button>
          <button class="player-btn" id="btn-repeat" onclick="app.player.toggleRepeat()" title="Repeat">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
            </svg>
          </button>
        </div>
        <div class="player-progress">
          <span id="player-time-current" class="player-time">0:00</span>
          <div class="progress-bar-container" id="progress-bar" onclick="app.player.seek(event)">
            <div class="progress-bar-bg">
              <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
          </div>
          <span id="player-time-total" class="player-time">0:00</span>
        </div>
      </div>
      <div class="player-extra">
        <button class="player-btn" id="btn-lyrics" onclick="app.toggleLyrics()" title="Lyrics">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor"
              d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
          </svg>
        </button>
        <button class="player-btn" id="btn-queue" onclick="app.toggleQueue()" title="Queue">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor"
              d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z" />
          </svg>
        </button>
        <div class="volume-control">
          <button class="player-btn" onclick="app.player.toggleMute()" title="Volume">
            <svg id="icon-volume" viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor"
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
            </svg>
          </button>
          <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="80"
            oninput="app.player.setVolume(this.value)">
        </div>
      </div>
    </div>


    <!-- Lyrics Panel -->
    <div id="lyrics-panel" class="lyrics-panel hidden">
      <div class="lyrics-panel-header">
        <div class="lyrics-panel-title">
          <span class="lyrics-icon">🎤</span>
          <span id="lyrics-track-title">Lyrics</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="lyrics-autoscroll-btn" id="btn-lyrics-resync" onclick="app.resyncLyrics()"
            title="Re-sync lyrics timing">
            🔄
          </button>
          <button class="lyrics-autoscroll-btn active" id="btn-lyrics-autoscroll" onclick="app.toggleLyricsAutoScroll()"
            title="Auto-scroll">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor"
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
            </svg>
            <span class="autoscroll-label">Auto-scroll</span>
          </button>
          <button class="lyrics-close" onclick="app.toggleLyrics()">✕</button>
        </div>
      </div>
      <div id="lyrics-content" class="lyrics-content">
        <div class="lyrics-placeholder">Select a song to see lyrics</div>
      </div>
    </div>

    <!-- Queue Panel -->
    <div id="queue-panel" class="queue-panel hidden">
      <div class="queue-header">
        <h3>Queue</h3>
        <button class="queue-close" onclick="app.toggleQueue()">✕</button>
      </div>
      <div id="queue-list" class="queue-list"></div>
    </div>

    <!-- Create Song Modal -->
    <div id="create-modal" class="modal-overlay hidden">
      <div class="modal" style="position:relative">
        <div class="modal-header">
          <h2>✨ Create New Song</h2>
          <div style="display:flex;align-items:center;gap:8px">
            <button type="button" class="surprise-btn" onclick="app.surpriseMe()">🎲 Surprise Me</button>
            <button class="modal-close" onclick="app.hideCreateModal()">✕</button>
          </div>
        </div>

        <!-- Live Preview Card -->
        <div class="live-preview" id="create-live-preview">
          <div class="live-preview-cover" id="preview-cover">🎵</div>
          <div class="live-preview-info">
            <div class="live-preview-title" id="preview-title">Your track title</div>
            <div class="live-preview-artist" id="preview-artist">Artist name</div>
            <div class="live-preview-tags" id="preview-tags"></div>
          </div>
          <div class="live-preview-label">Preview</div>
        </div>

        <form id="create-form" onsubmit="app.handleCreate(event)">
          <div class="form-group">
            <label for="create-artist">Artist Name</label>
            <input type="text" id="create-artist" placeholder="e.g. Midnight Echo" required
              oninput="app.updateLivePreview()">
          </div>
          <div class="form-group">
            <label for="create-title">Song Title</label>
            <input type="text" id="create-title" placeholder="e.g. Neon Dreams" required
              oninput="app.updateLivePreview()">
          </div>

          <!-- Vibe Picker -->
          <div class="form-group">
            <label>Pick a Vibe</label>
            <div class="vibe-picker" id="vibe-picker"></div>
          </div>

          <div class="form-group">
            <label for="create-prompt">Song Description / Style</label>
            <textarea id="create-prompt" rows="3"
              placeholder="Describe the vibe: dreamy synthwave with nostalgic vocals about city lights at midnight..."
              required></textarea>
          </div>

          <!-- Genre Tag Pills -->
          <div class="genre-pills-container">
            <span class="genre-pills-label">Genre / Style Tags</span>
            <div class="genre-pills" id="genre-pills"></div>
            <input type="hidden" id="create-tags" value="">
          </div>

          <div class="form-group">
            <label for="create-art">Cover Art Description <span class="label-hint">(optional)</span></label>
            <textarea id="create-art" rows="2"
              placeholder="Describe the cover art: neon cityscape with purple sky..."></textarea>
          </div>
          <div class="form-group form-row">
            <label class="checkbox-label">
              <input type="checkbox" id="create-instrumental">
              <span>Instrumental (no vocals)</span>
            </label>
          </div>
          <div class="submit-btn-wrapper">
            <button type="submit" class="submit-btn" id="create-submit-btn">
              <span class="submit-icon">✨</span> Generate Song
            </button>
            <div class="sparkle-container" id="sparkle-container"></div>
          </div>
        </form>
        <div id="create-status" class="create-status hidden"></div>
      </div>
    </div>

    <!-- Album Wizard Modal -->
    <div id="album-wizard" class="modal-overlay hidden">
      <div class="modal modal-wide" style="position:relative">
        <div class="modal-header">
          <h2>💿 Create Album</h2>
          <div style="display:flex;align-items:center;gap:8px">
            <button type="button" class="surprise-btn" onclick="app.surpriseMeAlbum()">🎲 Surprise Me</button>
            <button class="modal-close" onclick="app.hideAlbumWizard()">✕</button>
          </div>
        </div>

        <!-- Vinyl Step Indicator -->
        <div class="vinyl-steps" id="vinyl-steps">
          <div class="vinyl-step active" data-step="1">
            <div class="vinyl-disc"></div>
            <span class="vinyl-step-label">Album Info</span>
          </div>
          <div class="vinyl-step-line"></div>
          <div class="vinyl-step" data-step="2">
            <div class="vinyl-disc"></div>
            <span class="vinyl-step-label">Tracklist</span>
          </div>
          <div class="vinyl-step-line"></div>
          <div class="vinyl-step" data-step="3">
            <div class="vinyl-disc"></div>
            <span class="vinyl-step-label">Generate</span>
          </div>
        </div>

        <!-- Step 1: Album Info -->
        <div class="wizard-panel" id="album-step-1">
          <div class="form-group">
            <label for="album-artist">Artist Name</label>
            <input type="text" id="album-artist" placeholder="e.g. Midnight Echo" required>
          </div>
          <div class="form-group">
            <label for="album-name">Album Title</label>
            <input type="text" id="album-name" placeholder="e.g. Electric Horizons" required>
          </div>
          <div class="form-group">
            <label for="album-description">Album Concept / Vibe</label>
            <textarea id="album-description" rows="3"
              placeholder="Describe the album's overall mood, theme, and sound palette. e.g. A journey through neon-lit cities at night, blending synthwave with lo-fi beats..."
              required></textarea>
          </div>
          <div class="form-row-split">
            <div class="form-group">
              <label for="album-track-count">Number of Tracks</label>
              <input type="number" id="album-track-count" min="2" max="20" value="5">
            </div>
            <div class="form-group">
              <label>Genre / Tags</label>
              <div class="genre-pills" id="album-genre-pills" style="max-height:80px"></div>
              <input type="hidden" id="album-tags" value="">
            </div>
          </div>
          <div class="form-group">
            <label for="album-art">Album Cover Art Description <span class="label-hint">(optional)</span></label>
            <textarea id="album-art" rows="2"
              placeholder="Describe the album cover: futuristic cityscape at dusk..."></textarea>
          </div>
          <div class="form-group form-row">
            <label class="checkbox-label">
              <input type="checkbox" id="album-instrumental">
              <span>Instrumental album (no vocals)</span>
            </label>
          </div>
          <button type="button" class="submit-btn" id="album-plan-btn" onclick="app.generateTracklist()">
            <span class="submit-icon">🤖</span> Generate Tracklist with AI
          </button>
        </div>

        <!-- Step 2: Tracklist Editor -->
        <div class="wizard-panel hidden" id="album-step-2">
          <div class="album-vibe-banner">
            <div class="vibe-label">Album vibe</div>
            <div class="vibe-text" id="album-vibe-display"></div>
          </div>
          <div id="album-tracklist" class="album-tracklist"></div>
          <button type="button" class="add-track-btn" onclick="app.addAlbumTrack()">
            + Add Track
          </button>
          <div class="wizard-actions">
            <button type="button" class="wizard-back-btn" onclick="app.albumWizardStep(1)">← Back</button>
            <button type="button" class="submit-btn" onclick="app.albumWizardStep(3)">
              Review &amp; Generate →
            </button>
          </div>
        </div>

        <!-- Step 3: Review & Generate -->
        <div class="wizard-panel hidden" id="album-step-3">
          <div class="album-cover-preview" id="album-cover-preview">💿</div>
          <div class="review-card" id="album-review"></div>
          <div class="wizard-actions">
            <button type="button" class="wizard-back-btn" onclick="app.albumWizardStep(2)">← Edit Tracklist</button>
            <button type="button" class="submit-btn" id="album-generate-btn" onclick="app.handleAlbumGenerate()">
              <span class="submit-icon">✨</span> Generate Album
            </button>
          </div>
        </div>

        <div id="album-status" class="create-status hidden"></div>
      </div>
    </div>
    <!-- Cover Art Viewer -->
    <div id="cover-viewer" class="cover-viewer-overlay hidden">
      <button class="cover-viewer-close" onclick="app.hideCoverViewer()">✕</button>
      <div class="cover-viewer-title" id="cover-viewer-title"></div>
      <div class="cover-viewer-container" id="cover-viewer-container">
        <img id="cover-viewer-img" class="cover-viewer-img" src="" alt="Cover Art">
      </div>
    </div>
  </div>

  <audio id="audio-element" preload="auto"></audio>
  <script src="/js/app.js"></script>
</body>

</html>
